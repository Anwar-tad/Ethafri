{% extends 'marketplace/base.html' %}
{% block content %}
<div class="card border-0 shadow-sm rounded-4 p-4" style="max-width: 500px; margin: auto;">
    <h4 class="text-center fw-bold mb-3">እቃ ይሽጡ</h4>
    
    {% if not user.is_authenticated %}
    <div class="alert alert-info small py-2">
        <i class="fas fa-info-circle"></i> ያለ ሎግኢን እስከ 5 እቃ መለጠፍ ይችላሉ። (አሁን፡ {{ post_count }}/5)
    </div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label small fw-bold">የእቃው ስም</label>
            <input type="text" name="title" class="form-control rounded-pill" required>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">መግለጫ</label>
            <textarea name="description" class="form-control rounded-4" rows="3" required></textarea>
        </div>
        <div class="row">
            <div class="col-6 mb-3">
                <label class="form-label small fw-bold">ዋጋ</label>
                <input type="number" name="price" class="form-control rounded-pill">
            </div>
            <div class="col-6 mb-3">
                <label class="form-label small fw-bold">ቦታ</label>
                <input type="text" name="location" class="form-control rounded-pill">
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label small fw-bold">ምስል</label>
            <input type="file" name="image" class="form-control rounded-pill">
        </div>
        <button type="submit" class="btn btn-ai w-100 py-2 fw-bold shadow">
            <i class="fas fa-magic me-2"></i>በ AI አማካኝነት ይለጥፉ
        </button>
    </form>
</div>
{% endblock %}
