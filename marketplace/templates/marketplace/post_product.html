<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>እቃ ይሽጡ - EthAfri</title>
    <style>
        body { background-color: #f4f7f6; }
        .form-container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-ai { background: linear-gradient(45deg, #6c5ce7, #a29bfe); color: white; border: none; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">EthAfri</a>
        </div>
    </nav>

    <div class="container">
        <div class="form-container shadow">
            <h2 class="text-center mb-4"><i class="fas fa-plus-circle text-primary"></i> አዲስ እቃ ይለጥፉ</h2>
            <p class="text-muted text-center mb-4 small">መግለጫውን ብቻ ይጻፉ፣ የ EthAfri AI በራሱ ይመድበዋል!</p>
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label fw-bold">የእቃው ስም (Title)</label>
                    <input type="text" name="title" class="form-control rounded-pill" placeholder="ምሳሌ፡ ቶዮታ ቪትዝ 2022" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">መግለጫ (Description)</label>
                    <textarea name="description" class="form-control" rows="4" placeholder="ስለ እቃው በዝርዝር ይጻፉ..." required></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">ዋጋ (ETB)</label>
                        <input type="number" name="price" class="form-control rounded-pill" placeholder="0.00" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">ቦታ (Location)</label>
                        <input type="text" name="location" class="form-control rounded-pill" placeholder="ምሳሌ፡ አዲስ አበባ" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">ምስል (Image)</label>
                    <input type="file" name="image" class="form-control" accept="image/*">
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-ai btn-lg rounded-pill shadow">
                        <i class="fas fa-magic"></i> በ AI አማካኝነት ይለጥፉ
                    </button>
                    <a href="/" class="btn btn-light rounded-pill border">ይቅር</a>
                </div>
            </form>
        </div>
    </div>

    <footer class="text-center py-4 mt-5 text-muted">
        <small>&copy; 2026 EthAfri Smart Marketplace</small>
    </footer>

</body>
</html>
