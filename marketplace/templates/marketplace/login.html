{% extends 'marketplace/base.html' %}
{% block content %}
<div class="form-container shadow p-4 rounded-4 bg-white" style="max-width: 400px; margin: auto;">
    <h3 class="text-center mb-4">መግቢያ</h3>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100 rounded-pill">ግባ</button>
    </form>
    <p class="mt-3 text-center">አካውንት የለዎትም? <a href="{% url 'signup' %}">ይመዝገቡ</a></p>
</div>
{% endblock %}
