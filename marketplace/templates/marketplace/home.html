<!-- templates/marketplace/home.html -->
<!DOCTYPE html>
<html lang="am">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>EthAfri - ከመርፌ እስከ መርከብ</title>
</head>
<body class="bg-light">
    <!-- Header -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">EthAfri (ኢቲአፍሪ)</a>
            <form class="d-flex w-50">
                <input class="form-control me-2" type="search" placeholder="መርፌ፣ መኪና፣ ቤት ይፈልጉ...">
                <button class="btn btn-warning" type="submit">ፈልግ</button>
            </form>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="container mt-4">
        <div class="p-5 mb-4 bg-primary text-white rounded-3 shadow">
            <h1>በአፍሪካ ግንባር ቀደም የዲጂታል ገበያ</h1>
            <p>በ AI የታገዘ፣ ራሱን እያሳደገ የሚሄድ ሁሉንም ነገር አንድ ላይ የሚያገኙበት ማርኬት ፕሌስ።</p>
            <a href="{% url 'add_product' %}" class="btn btn-light btn-lg">እቃ ይሽጡ</a>
        </div>

        <!-- Categories -->
        <h3>ምድቦች</h3>
        <div class="row text-center">
            <div class="col-md-2 p-2"><div class="card p-3 shadow-sm">🚗 መኪና</div></div>
            <div class="col-md-2 p-2"><div class="card p-3 shadow-sm">🏠 ቤት</div></div>
            <div class="col-md-2 p-2"><div class="card p-3 shadow-sm">🚢 መርከብ/ሎጅስቲክስ</div></div>
            <div class="col-md-2 p-2"><div class="card p-3 shadow-sm">💉 መርፌ/ጤና</div></div>
            <div class="col-md-2 p-2"><div class="card p-3 shadow-sm">🌾 ግብርና</div></div>
        </div>
    </div>
</body>
</html>
