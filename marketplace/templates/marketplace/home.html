<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>EthAfri - የኢትዮጵያ ዲጂታል ገበያ</title>
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">EthAfri (ኢቲአፍሪ)</a>
            <form class="d-flex w-50" method="GET" action="{% url 'home' %}">
                <input class="form-control me-2" type="search" name="q" placeholder="መርፌ፣ መኪና፣ ቤት..." aria-label="Search">
                <button class="btn btn-warning" type="submit">ፈልግ</button>
            </form>
            <div class="ms-auto">
                <a href="{% url 'post_product' %}" class="btn btn-outline-light">+ እቃ ይሽጡ</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container mt-4">
        <h3 class="mb-4">የዛሬ አዳዲስ እቃዎች</h3>
        <div class="row">
            {% for product in products %}
            <div class="col-md-3 mb-4">
                <div class="card h-100 shadow-sm border-0">
                    {% if product.image %}
                        <img src="{{ product.image.url }}" class="card-img-top" style="height: 200px; object-fit: cover;">
                    {% endif %}
                    <div class="card-body">
                        <h5 class="card-title">{{ product.title }}</h5>
                        <p class="text-primary fw-bold">{{ product.price }} ETB</p>
                        <p class="small text-muted">{{ product.location }}</p>
                        <span class="badge bg-info text-dark">{{ product.category.name }}</span>
                    </div>
                </div>
            </div>
            {% empty %}
                <p class="text-center">ምንም እቃ አልተገኘም።</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
