<!-- EthAfri/templates/marketplace/base.html -->
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>EthAfri - Global Marketplace</title>
    <style>
        :root { --primary-color: {{ theme.theme_color|default:"#1a2a6c" }}; }
        body { background-color: #f4f7f6; padding-bottom: 80px; }
        .navbar { background-color: var(--primary-color) !important; }
        .hero-banner { 
            background: linear-gradient(135deg, var(--primary-color), #4e085e); 
            color: white; padding: 50px 0; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">{{ theme.logo_text|default:"EthAfri" }}</a>
            {% if user.is_staff %}
            <span class="badge bg-warning text-dark">Admin Mode</span>
            {% endif %}
        </div>
    </nav>

    <div class="hero-banner text-center mb-4 shadow">
        <h1>{{ theme.banner_title|default:"እንኳን ደህና መጡ" }}</h1>
        <p>{{ theme.banner_sub|default:"በ AI የሚመራው ግዙፍ የአፍሪካ ገበያ" }}</p>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
