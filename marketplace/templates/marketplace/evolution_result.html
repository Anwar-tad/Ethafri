<!-- EthAfri/templates/marketplace/evolution_result.html -->
{% extends 'marketplace/base.html' %}
{% block content %}
<div class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <div class="card-header bg-success text-white py-3">
        <h5 class="mb-0"><i class="fas fa-check-circle me-2"></i> AI ስራውን አጠናቋል!</h5>
    </div>
    <div class="card-body p-4">
        <div class="mb-4">
            <h6 class="fw-bold text-muted text-uppercase">የተከናወነ ተግባር</h6>
            <p class="display-6">{{ task.task_name }}</p>
        </div>

        <div class="mb-4">
            <h6 class="fw-bold text-muted text-uppercase">AI የሰጠው ምክንያት (Reasoning)</h6>
            <div class="p-3 bg-light rounded-4 border-start border-primary border-4">
                {{ task.priority_reason|linebreaks }}
            </div>
        </div>

        <div class="mb-4">
            <h6 class="fw-bold text-muted text-uppercase">የተቀየረ የሲስተም ኮድ (AI JSON Config)</h6>
            <pre class="bg-dark text-warning p-3 rounded-4" style="font-size: 12px; max-height: 200px; overflow-y: auto;">
{{ task.priority_reason }} <!-- እዚህ ጋር የተቀየረው ዳታ በሎግ መልክ ይቀመጣል -->
            </pre>
        </div>

        <div class="d-grid gap-2">
            <a href="/" class="btn btn-primary rounded-pill py-2 fw-bold">ወደ ዋና ገጽ ተመለስና ለውጡን እይ</a>
            <a href="{% url 'growth_dashboard' %}" class="btn btn-outline-dark rounded-pill py-2">ሁሉንም የታሪክ ሎጎች (Logs) ተመልከት</a>
        </div>
    </div>
</div>
{% endblock %}
