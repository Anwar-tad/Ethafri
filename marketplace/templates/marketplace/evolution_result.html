<!-- EthAfri/templates/marketplace/evolution_result.html -->
{% extends 'marketplace/base.html' %}
{% block content %}
<div class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <div class="card-header bg-success text-white py-3">
        <h5 class="mb-0"><i class="fas fa-robot me-2"></i> AI ስራውን አጠናቋል!</h5>
    </div>
    <div class="card-body p-4 text-center">
        <h1 class="display-6 fw-bold text-dark mb-4">{{ task.task_name }}</h1>
        
        <div class="text-start mb-4">
            <h6 class="text-muted text-uppercase small fw-bold">የ AI ውሳኔ (Reasoning)</h6>
            <div class="p-3 bg-light rounded-4 border-start border-primary border-4">
                {{ task.priority_reason|linebreaks }}
            </div>
        </div>

        <div class="d-grid gap-2">
            <a href="/" class="btn btn-primary rounded-pill py-2">ወደ ዋና ገጽ ተመለስና ለውጡን እይ</a>
            <a href="{% url 'growth_dashboard' %}" class="btn btn-outline-dark rounded-pill py-2">ሁሉንም ሎጎች ተመልከት</a>
        </div>
    </div>
</div>
{% endblock %}
