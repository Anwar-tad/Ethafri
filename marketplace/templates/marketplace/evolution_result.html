<!-- EthAfri/templates/marketplace/evolution_result.html -->
{% extends 'marketplace/base.html' %}
{% block content %}
<div class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <div class="card-header bg-success text-white py-3 text-center">
        <h5 class="mb-0"><i class="fas fa-check-circle me-2"></i> AI ስራውን በስኬት አጠናቋል!</h5>
    </div>
    <div class="card-body p-5">
        <h1 class="display-5 fw-bold text-dark text-center mb-4">{{ task.task_name }}</h1>
        
        <div class="mb-5">
            <h6 class="text-muted text-uppercase small fw-bold mb-3"><i class="fas fa-brain me-2"></i> የ AI ውሳኔ (Reasoning)</h6>
            <div class="p-4 bg-light rounded-4 border-start border-primary border-5 fs-5">
                {{ task.priority_reason|linebreaks }}
            </div>
        </div>

        <div class="d-grid gap-3">
            <a href="/" class="btn btn-primary btn-lg rounded-pill shadow-sm">ወደ ዋና ገጽ ተመለስና ለውጡን እይ</a>
            <a href="{% url 'growth_dashboard' %}" class="btn btn-outline-dark rounded-pill">ሁሉንም ሎጎች ተመልከት</a>
        </div>
    </div>
</div>
{% endblock %}
