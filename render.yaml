# ============================================================
# 📁 ፋይል፦ EthAfri/render.yaml
# 📝 ለውጥ፦ v10.16 Master Secure Infrastructure — Python 3.11.8 & Supabase DB Synced
# ✅ የተፈቱ ችግሮች፦ Dynamic proxy headers allowed in uvicorn start command, Python version mapped, and env key protection.
# 📅 ቀን፦ Thursday, July 02, 2026
# ============================================================

services:
  # ============================================================
  # 1. 🌐 ዋና የድረ-ገጽ አገልግሎት (Web Service)
  # ============================================================
  - type: web
    name: ethafri
    runtime: python
    plan: free
    buildCommand: ./build.sh
    # ኡቪኮርን (Uvicorn ASGI) ዌብሶኬቱ በጥራት እንዲሰራ ያስችለዋል
    # --forwarded-allow-ips='*' ሬንደር በሚጠቀምበት የሪቨርስ ፕሮክሲ (Reverse Proxy) መረብ ላይ ግንኙነቶች እንዳይቋረጡ ያረጋግጣል [1]
    startCommand: uvicorn core.asgi:application --host 0.0.0.0 --port $PORT --workers 1 --forwarded-allow-ips='*'
    envVars:
      # የሬንደር ዳታቤዝ ሙሉ በሙሉ ጠፍቶ ከውጪው ሱፓቤዝ (Supabase) ጋር በጥራት ተገናኝቷል
      # ይህንን ቁልፍ በ Render Dashboard -> Environment Variables ላይ የሱፓቤዝ ሊንክህን በመለጠፍ ማስተሳሰር ትችላለህ
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # የፓይተን ስሪት በሰርቨርዎ ላይ ካለው የ3.11.8 ስሪት ጋር ተመሳስሏል
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: AUTONOMOUS_AGENT_ENABLED
        value: "true"
      - key: AGENT_INTERVAL
        value: "600"
      - key: SKIP_SHELL
        value: "true"
      # ሬንደር በአውቶ-ዲፕሎይ ጊዜ የ AI ቁልፎችን እንዳያጠፋ በ sync: false በጥራት ተጠብቀዋል
      - key: GITHUB_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
    autoDeploy: true
    healthCheckPath: /