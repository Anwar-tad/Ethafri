# ============================================================
# 📁 ፋይል፦ EthAfri/render.yaml
# 📝 ለውጥ፦ v1.4 Master Secure Infrastructure — External Supabase DB Integrated
# ✅ የተፈቱ ችግሮች፦ Redundant Render PostgreSQL removed, DATABASE_URL mapped to external Supabase connection string
# 📅 ቀን፦ 2026-06-27
# ============================================================

services:
  # ============================================================
  # 1. 🌐 ዋና የድረ-ገጽ አገልግሎት (Web Service)
  # ============================================================
  - type: web
    name: ethafri
    runtime: python
    plan: free
    buildCommand: ./build.sh
    # ኡቪኮርን (Uvicorn ASGI) ዌብሶኬቱ በጥራት እንዲሰራ ያስችለዋል
    startCommand: uvicorn core.asgi:application --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      # ✅ FIXED: የሬንደር ዳታቤዝ ሙሉ በሙሉ ጠፍቶ ከውጪው ሱፓቤዝ (Supabase) ጋር በጥራት ተገናኝቷል
      # ይህንን ቁልፍ በ Render Dashboard -> Environment Variables ላይ የሱፓቤዝ ሊንክህን በመለጠፍ ማስተሳሰር ትችላለህ
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: AUTONOMOUS_AGENT_ENABLED
        value: "true"
      - key: AGENT_INTERVAL
        value: "600"
      - key: SKIP_SHELL
        value: "true"
      # ሬንደር በአውቶ-ዲፕሎይ ጊዜ የ AI ቁልፎችን እንዳያጠፋ በ sync: false በጥራት ተጠብቀዋል
      - key: GITHUB_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
    autoDeploy: true
    healthCheckPath: /