# ============================================================
# 📁 ፋይል፦ EthAfri/render.yaml
# 📝 ለውጥ፦ v1.2 Master Secure Infrastructure — sync: false API Gating (v1.2)
# ✅ የተፈቱ ችግሮች፦ Prevent Render from wiping out GITHUB_TOKEN & API Keys on auto-deploy
# 📅 ቀን፦ 2026-06-27
# ============================================================

services:
  # ============================================================
  # 1. 🌐 ዋና የድረ-ገጽ አገልግሎት (Web Service)
  # ============================================================
  - type: web
    name: ethafri
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: |
      python manage.py migrate --no-input || python manage.py makemigrations --merge && python manage.py migrate --no-input
      python create_admin.py
      python manage.py run_agent --once &
      gunicorn core.wsgi:application --workers=1 --threads=1 --timeout=120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ethafri_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: AUTONOMOUS_AGENT_ENABLED
        value: "true"
      - key: AGENT_INTERVAL
        value: "600"
      - key: SKIP_SHELL
        value: "true"
      # ✅ FIXED: ሬንደር በአውቶ-ዲፕሎይ ጊዜ የ AI ቁልፎችን እንዳያጠፋ በ sync: false ተጠብቀዋል (የሕግ 3 ጥበቃ)
      - key: GITHUB_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
    autoDeploy: true
    healthCheckPath: /

  # ============================================================
  # 2. 🤖 ራስ-ገዝ ኤጀንት ሠራተኛ (Worker — 24/7 Agent)
  # ============================================================
  - type: worker
    name: ethafri-agent
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: |
      python manage.py migrate --no-input || python manage.py makemigrations --merge && python manage.py migrate --no-input
      python manage.py run_agent --interval $AGENT_INTERVAL
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ethafri_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: AUTONOMOUS_AGENT_ENABLED
        value: "true"
      - key: AGENT_INTERVAL
        value: "600"
      - key: SKIP_SHELL
        value: "true"
      # ✅ FIXED: ሬንደር በሠራተኛው (Worker) ላይም የ AI ቁልፎችን እንዳያጠፋ በ sync: false ተጠብቀዋል
      - key: GITHUB_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

  # ============================================================
  # 3. ⏰ የድሮ ክሮን ሠራተኛ (Backup Worker)
  # ============================================================
  - type: worker
    name: ethafri-cron
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: |
      while true; do
        python manage.py run_agent --once
        sleep 300
      done
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ethafri_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.10.0"

# ============================================================
# 4. 🗄️ የውሂብ ጎታ (Database)
# ============================================================
databases:
  - name: ethafri_db
    plan: free
    postgresMajorVersion: 15