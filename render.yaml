# 📝 ለውጥ፦ Render Blueprint Configuration
# 📅 ቀን፦ 2026-06-20
# ============================================================

services:
  - type: web
    name: ethafri
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python manage.py migrate --no-input && python create_admin.py && gunicorn core.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ethafri_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.10.0"
    autoDeploy: true
    healthCheckPath: /
    
  - type: worker
    name: ethafri-worker
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python manage.py evolve_market
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ethafri_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.10.0"

databases:
  - name: ethafri_db
    plan: free
    postgresMajorVersion: 15